<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Bang</title>
</head>
<body>

    <header>
        <h1>Weather Bang</h1>
        <form id="search-form">
            <input type="text" id="city-search" placeholder="Enter city name..." required>
            <button type="submit" id="submit-btn">Search</button>
        </form>
    </header>

    <main id="content">
        <div class="weather-card hidden">
            <h2 class="city-name"></h2>
            <div class="weather-info">
                <span class="temperature"></span>
                <button id="unit-toggle">Switch to °C</button> <p class="description"></p>
                <p class="description"></p>
            </div>
            <div id="loading-spinner" class="hidden">Loading...</div>
        </div>
        <div class="forecast-container"></div>
    </main>

    <footer>
        <p>weather by Open Meteo</p>
    </footer>

</body>
</html>
